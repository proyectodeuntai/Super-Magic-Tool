name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generar config.js desde secrets
        run: |
          printf 'const FIREBASE_CONFIG = {\n  apiKey: "%s",\n  authDomain: "%s",\n  databaseURL: "%s",\n  projectId: "%s",\n  storageBucket: "%s",\n  messagingSenderId: "%s",\n  appId: "%s"\n};\n' "${{ secrets.FIREBASE_API_KEY }}" "${{ secrets.FIREBASE_AUTH_DOMAIN }}" "${{ secrets.FIREBASE_DATABASE_URL }}" "${{ secrets.FIREBASE_PROJECT_ID }}" "${{ secrets.FIREBASE_STORAGE_BUCKET }}" "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" "${{ secrets.FIREBASE_APP_ID }}" > config.js
          
          # Eliminamos config.js del .gitignore temporalmente 
          # para que la acción pueda subirlo a gh-pages
          sed -i '/config.js/d' .gitignore

      - name: Deploy a gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true
          exclude_assets: ''